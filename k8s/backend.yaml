apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devtools-hub
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: devtools-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/edita-softdev-dot/devtools-hub-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devtools-hub-config
            - secretRef:
                name: devtools-hub-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devtools-hub
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: devtools-hub
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 3000
      targetPort: 3000
