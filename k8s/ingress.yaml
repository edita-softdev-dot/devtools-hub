apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devtools-hub-ingress
  namespace: devtools-hub
  labels:
    app.kubernetes.io/part-of: devtools-hub
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: devtools.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
